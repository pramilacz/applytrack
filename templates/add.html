<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Application - ApplyTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="nav-logo">⚡ ApplyTrack</a>
        <div class="nav-right">
            <a href="{{ url_for('dashboard') }}" class="nav-link">← Back</a>
        </div>
    </nav>
    <div class="container">
        <div class="page-header">
            <h2>Add New Application</h2>
            <p>Log a new internship or job application.</p>
        </div>
        <div class="form-container">
            <form method="POST" class="app-form">
                <label>Company Name</label>
                <input type="text" name="company" placeholder="e.g. WSO2" required>

                <label>Role</label>
                <input type="text" name="role" placeholder="e.g. Software Engineer Intern" required>

                <label>Date Applied</label>
                <input type="date" name="date" required>

                <label>Status</label>
                <select name="status">
                    <option value="Applied">Applied</option>
                    <option value="Interview">Interview</option>
                    <option value="Offer">Offer</option>
                    <option value="Rejected">Rejected</option>
                </select>

                <label>Notes</label>
                <textarea name="notes" placeholder="Any notes about this application..."></textarea>

                <button type="submit">Save Application</button>
            </form>
        </div>
    </div>
</body>
</html>
